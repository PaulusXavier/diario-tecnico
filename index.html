<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário Técnico - Paulo Xavier</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 { font-size: 1.5rem; text-align: center; color: var(--accent); }

        .info-header {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--accent);
            border-radius: 10px;
            color: white;
            padding: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-voice { background-color: #ef4444; color: white; }
        .btn-gps { background-color: #10b981; color: white; }
        .btn-pdf { background-color: #3b82f6; color: white; grid-column: span 2; }
        
        button:active { transform: scale(0.95); }

        /* Estilo para a Impressão (PDF) */
        @media print {
            body { background: white; color: black; padding: 0; }
            .container { border: none; box-shadow: none; width: 100%; max-width: none; background: transparent; }
            button, .btn-grid { display: none !important; }
            textarea { border: none; color: black; background: transparent; height: auto; }
            h1 { color: black; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Diário Técnico 📝</h1>
    
    <div class="info-header">
        <div id="data-hora">Carregando data...</div>
        <div id="localizacao">Buscando GPS...</div>
    </div>

    <textarea id="relatorio" placeholder="O que aconteceu hoje, Paulo?"></textarea>

    <div class="btn-grid">
        <button class="btn-voice" onclick="toggleVoz()" id="btnVoz">🎤 Gravar Voz</button>
        <button class="btn-gps" onclick="pegarGPS()">📍 Atualizar GPS</button>
        <button class="btn-pdf" onclick="gerarPDF()">📄 Salvar como PDF</button>
    </div>
</div>

<script>
    // 1. RELÓGIO EM TEMPO REAL
    function atualizarRelogio() {
        const agora = new Date();
        const texto = agora.toLocaleDateString('pt-BR') + " às " + agora.toLocaleTimeString('pt-BR');
        document.getElementById('data-hora').innerText = "🗓️ " + texto;
    }
    setInterval(atualizarRelogio, 1000);
    atualizarRelogio();

    // 2. FUNÇÃO GPS
    function pegarGPS() {
        const loc = document.getElementById('localizacao');
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                loc.innerText = `📍 Lat: ${pos.coords.latitude.toFixed(4)}, Long: ${pos.coords.longitude.toFixed(4)}`;
            }, () => {
                loc.innerText = "❌ GPS não autorizado";
            });
        }
    }
    pegarGPS();

    // 3. RECONHECIMENTO DE VOZ
    let recognition;
    let gravando = false;

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.continuous = true;

        recognition.onresult = (event) => {
            const texto = event.results[event.results.length - 1][0].transcript;
            document.getElementById('relatorio').value += texto + " ";
        };
    }

    function toggleVoz() {
        const btn = document.getElementById('btnVoz');
        if (!gravando) {
            recognition.start();
            btn.innerText = "🛑 Parar Gravação";
            btn.style.backgroundColor = "#991b1b";
            gravando = true;
        } else {
            recognition.stop();
            btn.innerText = "🎤 Gravar Voz";
            btn.style.backgroundColor = "#ef4444";
            gravando = false;
        }
    }

    // 4. GERAR PDF (IMPRESSÃO)
    function gerarPDF() {
        // Adiciona data/hora no texto antes de imprimir se estiver vazio
        const campo = document.getElementById('relatorio');
        const header = document.getElementById('data-hora').innerText;
        const local = document.getElementById('localizacao').innerText;
        
        console.log("Gerando PDF do relatório...");
        window.print();
    }
</script>

</body>
</html>
