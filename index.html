<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário de Campo - Paulo Xavier</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root { --bg: #0f172a; --glass: rgba(255, 255, 255, 0.1); --accent: #3b82f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .container { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; width: 100%; max-width: 600px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Cabeçalho solicitado */
        .header-app { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--accent); padding-bottom: 15px; }
        .header-app h1 { font-size: 1.8rem; margin: 0; color: #60a5fa; text-transform: uppercase; letter-spacing: 1px; }
        .header-app p { font-size: 1rem; color: #cbd5e1; margin: 8px 0 0 0; font-weight: 500; }
        
        .info-header { font-size: 0.85rem; color: #94a3b8; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; line-height: 1.5; }

        input#titulo { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--accent); border-radius: 8px; color: white; padding: 12px; box-sizing: border-box; margin-bottom: 15px; font-size: 1.1rem; }
        
        textarea { width: 100%; height: 250px; background: rgba(0,0,0,0.3); border: 1px solid var(--accent); border-radius: 10px; color: white; padding: 12px; box-sizing: border-box; margin-bottom: 15px; font-size: 1rem; line-height: 1.5; resize: none; }
        
        #preview-img { width: 100%; border-radius: 10px; margin-bottom: 15px; display: none; border: 2px solid var(--accent); }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-size: 0.85rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .btn-voz { background: #ef4444; }
        .btn-gps { background: #10b981; }
        .btn-img { background: #f59e0b; }
        .btn-clear { background: #64748b; }
        .btn-pdf { background: var(--accent); grid-column: span 2; font-size: 1rem; }
        .btn-word { background: #2b579a; grid-column: span 2; }

        button:active { transform: scale(0.96); opacity: 0.9; }

        @media print {
            body { background: white !important; color: black !important; }
            .container { border: none; box-shadow: none; background: transparent; }
            .header-app h1, .header-app p { color: black !important; }
            button, .btn-grid, input[type="file"] { display: none !important; }
            textarea, input#titulo { border: none; color: black !important; background: transparent; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-app">
        <h1>Diário de Campo</h1>
        <p>Paulo Xavier - Psicólogo<br>CRP-20/09816</p>
    </div>
    
    <div class="info-header">
        <div id="data-hora">🗓️ Carregando data...</div>
        <div id="endereco">📍 Buscando localização...</div>
    </div>

    <input type="text" id="titulo" placeholder="Título do Relatório">
    
    <img id="preview-img" src="" alt="Anexo">
    
    <textarea id="relatorio" placeholder="Descrição do relatório..."></textarea>

    <input type="file" id="input-img" accept="image/*" style="display: none;" onchange="exibirImagem(this)">

    <div class="btn-grid">
        <button class="btn-voz" onclick="toggleVoz()" id="btnVoz">🎤 Voz</button>
        <button class="btn-gps" onclick="pegarGPS()">📍 GPS</button>
        <button class="btn-img" onclick="document.getElementById('input-img').click()">🖼️ Foto</button>
        <button class="btn-clear" onclick="limparTudo()">🗑️ Limpar</button>
        <button class="btn-pdf" onclick="window.print()">📄 Salvar em PDF</button>
        <button class="btn-word" onclick="salvarWord()">🟦 Salvar em Word</button>
    </div>
</div>

<script>
    // RELÓGIO ATUALIZADO
    function atualizarRelogio() {
        const agora = new Date();
        document.getElementById('data-hora').innerText = "🗓️ " + agora.toLocaleDateString('pt-BR') + " às " + agora.toLocaleTimeString('pt-BR');
    }
    setInterval(atualizarRelogio, 1000);
    atualizarRelogio();

    // GPS COM ENDEREÇO
    function pegarGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                try {
                    const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const data = await resp.json();
                    document.getElementById('endereco').innerText = "📍 " + (data.display_name || "Local não identificado");
                } catch {
                    document.getElementById('endereco').innerText = `📍 Lat: ${latitude.toFixed(4)}, Lon: ${longitude.toFixed(4)}`;
                }
            });
        }
    }
    pegarGPS();

    // ANEXAR IMAGEM
    function exibirImagem(input) {
        const preview = document.getElementById('preview-img');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // VOZ
    let recognition;
    let gravando = false;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.continuous = true;
        recognition.onresult = (e) => {
            document.getElementById('relatorio').value += e.results[e.results.length-1][0].transcript + " ";
        };
    }

    function toggleVoz() {
        const btn = document.getElementById('btnVoz');
        if (!gravando) {
            recognition.start();
            btn.innerText = "🛑 Parar";
            btn.style.background = "#b91c1c";
        } else {
            recognition.stop();
            btn.innerText = "🎤 Voz";
            btn.style.background = "#ef4444";
        }
        gravando = !gravando;
    }

    // APAGAR TUDO
    function limparTudo() {
        if (confirm("Deseja apagar todo o conteúdo atual?")) {
            document.getElementById('titulo').value = "";
            document.getElementById('relatorio').value = "";
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('input-img').value = "";
        }
    }

    // SALVAR EM WORD
    function salvarWord() {
        const titulo = document.getElementById('titulo').value || "Diario_de_Campo";
        const data = document.getElementById('data-hora').innerText;
        const local = document.getElementById('endereco').innerText;
        const texto = document.getElementById('relatorio').value;
        
        const conteudo = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head><meta charset='utf-8'></head>
            <body style="font-family: Arial;">
                <h1 style="text-align: center;">Diário de Campo</h1>
                <p style="text-align: center;"><b>Paulo Xavier - Psicólogo | CRP-20/09816</b></p>
                <hr>
                <p><b>Data:</b> ${data}</p>
                <p><b>Local:</b> ${local}</p>
                <h3>Título: ${titulo}</h3>
                <p>${texto.replace(/\n/g, '<br>')}</p>
            </body>
            </html>
        `;

        const blob = new Blob(['\ufeff', conteudo], { type: 'application/msword' });
        saveAs(blob, `${titulo}.doc`);
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }
</script>

</body>
</html>
